<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Продажи</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0e0e11;--s1:#17171c;--s2:#1f1f27;--border:#2c2c38;
  --text:#eeeef5;--muted:#55556a;--muted2:#3a3a4a;
  --accent:#7c6af7;--teal:#3ecfbf;--red:#ff5252;--gold:#f0b429;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;min-height:100vh;overscroll-behavior:none;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.app-name{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.hdr-right{display:flex;align-items:center;gap:10px;}

/* Sync indicator */
.sync{width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:background .3s;flex-shrink:0;}
.sync.ok{background:var(--teal);}
.sync.err{background:var(--red);}
.sync.loading{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Year nav */
.year-nav{display:flex;align-items:center;}
.yr-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 10px;border-radius:6px;transition:.15s;line-height:1;}
.yr-btn:hover{color:var(--text);background:var(--s2);}
.yr-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);font-weight:600;min-width:40px;text-align:center;}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 12px;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 11px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat.revenue::before{background:var(--accent);}
.stat.profit-m::before{background:var(--teal);}
.stat.profit-y::before{background:var(--gold);}
.stat-lbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;line-height:1.2;}
.stat-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat.revenue .stat-amt{color:var(--accent);}
.stat.profit-m .stat-amt{color:var(--teal);}
.stat.profit-y .stat-amt{color:var(--gold);}
.stat-cnt{font-size:9px;color:var(--muted);margin-top:1px;}

/* SPARKLINE */
.sparkline{display:flex;align-items:flex-end;gap:3px;padding:0 16px 10px;height:28px;}
.sp-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;gap:2px;}
.sp-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s ease;}
.sp-bar.cur{box-shadow:0 0 6px rgba(124,106,247,.6);}
.sp-lbl{font-size:7.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;line-height:1;}
.sp-lbl.cur{color:var(--accent);}

/* MONTH TABS */
.tabs-wrap{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border);}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Onest',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s;position:relative;}
.tab.has-data::after{content:'';position:absolute;top:8px;right:7px;width:3px;height:3px;border-radius:50%;background:var(--teal);opacity:.7;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ADD FORM */
.form-wrap{margin:12px 16px;}
.form-inner{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px;display:flex;flex-direction:column;gap:7px;}
.inp{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-family:'Onest',sans-serif;font-size:15px;outline:none;transition:border-color .2s;width:100%;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--muted);}
.inp.mono{font-family:'JetBrains Mono',monospace;}
.inp:disabled{opacity:.5;}
.form-prices{display:flex;gap:7px;align-items:stretch;}
.price-group{flex:1;position:relative;}
.price-group .inp{padding-left:20px;}
.price-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);pointer-events:none;}
.btn-add{background:var(--accent);border:none;border-radius:8px;width:46px;flex-shrink:0;color:#fff;font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.btn-add:active{transform:scale(.91);}
.btn-add:disabled{opacity:.5;cursor:not-allowed;}

/* LIST */
.list{padding:0 16px 50px;display:flex;flex-direction:column;gap:6px;}
.row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:16px 1fr auto;grid-template-rows:auto auto;column-gap:8px;row-gap:3px;animation:pop .2s ease;}
@keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.row-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:right;grid-row:1;align-self:center;}
.row-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;grid-row:1;align-self:center;}
.row-profit{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--teal);white-space:nowrap;grid-row:1;align-self:center;text-align:right;}
.row-profit.loss{color:var(--red);}
.row-meta{grid-column:2;grid-row:2;display:flex;align-items:center;gap:8px;}
.row-prices-txt{font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;align-items:center;gap:4px;}
.price-arrow{color:var(--muted2);font-size:10px;}
.price-buy{color:var(--muted);}
.price-sell{color:var(--text);}
.row-date{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto;}
.row-actions{grid-column:3;grid-row:2;display:flex;gap:2px;align-items:center;justify-content:flex-end;}
.ico{background:none;border:none;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:.28;transition:.15s;color:var(--text);}
.ico:active{opacity:1;}
.ico.edit:hover{color:var(--accent);opacity:1;background:rgba(124,106,247,.1);}
.ico.copy:hover{color:var(--gold);opacity:1;background:rgba(240,180,41,.1);}
.ico.del:hover{color:var(--red);opacity:1;background:rgba(255,82,82,.1);}

/* EDIT ROW */
.row.editing{border-color:var(--accent);background:rgba(124,106,247,.05);}
.edit-row-top{grid-column:1/-1;grid-row:1;display:flex;gap:6px;align-items:center;}
.edit-row-bot{grid-column:1/-1;grid-row:2;display:flex;gap:6px;align-items:center;}
.edit-inp{background:var(--s2);border:1px solid var(--accent);border-radius:6px;padding:7px 9px;color:var(--text);font-family:'Onest',sans-serif;font-size:13px;outline:none;}
.edit-inp.mono{font-family:'JetBrains Mono',monospace;}
.edit-inp.sm{width:80px;}
.btn-ok{background:var(--accent);border:none;border-radius:6px;padding:7px 12px;color:#fff;font-family:'Onest',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-x{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;opacity:.5;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px;}
.empty-i{font-size:28px;margin-bottom:8px;opacity:.3;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(8px);}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px 20px 44px;width:100%;max-width:480px;text-align:center;}
.modal-i{font-size:24px;margin-bottom:10px;}
.modal-t{font-size:16px;font-weight:600;margin-bottom:4px;}
.modal-s{font-size:13px;color:var(--muted);margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:13px;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Onest',sans-serif;font-size:15px;cursor:pointer;}
.btn-del{flex:1;padding:13px;background:var(--red);border:none;border-radius:10px;color:#fff;font-family:'Onest',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONFIG ──────────────────────────────────────────────
const SB_URL = 'https://audcbthzhkadhtohixub.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1ZGNidGh6aGthZGh0b2hpeHViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTU4OTEsImV4cCI6MjA4OTYzMTg5MX0.Grt_A2q_3rTFmP0Kc1hTtITqfpMQ6UXX6d-hsr0-NIU';

// ── CONSTANTS ────────────────────────────────────────────
const MO = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MF = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// ── STATE ─────────────────────────────────────────────────
const S = {
  sales: [],
  month: new Date().getMonth(),
  year:  new Date().getFullYear(),
  loading: true,   // initial data fetch
  saving:  false,  // any write in progress
  syncOk:  null,   // null=unknown, true=ok, false=error
  editId: null, editName: '', editBuy: '', editSell: '',
  newName: '', newBuy: '', newSell: '',
  delId: null
};

// ── SUPABASE API ─────────────────────────────────────────
const headers = {
  'Content-Type': 'application/json',
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`
};

async function dbLoad() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/sales?select=*&order=date.desc`, { headers });
    if (!r.ok) throw new Error(r.status);
    const rows = await r.json();
    S.sales = rows.map(row => ({
      id:        row.id,
      name:      row.name,
      buyPrice:  Number(row.buy_price) || 0,
      sellPrice: Number(row.sell_price),
      date:      row.date
    }));
    S.syncOk = true;
  } catch(e) {
    console.error('Load error', e);
    S.syncOk = false;
  } finally {
    S.loading = false;
    render();
  }
}

async function dbInsert(sale) {
  const r = await fetch(`${SB_URL}/rest/v1/sales`, {
    method: 'POST',
    headers: { ...headers, 'Prefer': 'return=representation' },
    body: JSON.stringify({
      id:         sale.id,
      name:       sale.name,
      buy_price:  sale.buyPrice,
      sell_price: sale.sellPrice,
      date:       sale.date
    })
  });
  if (!r.ok) throw new Error(await r.text());
}

async function dbUpdate(sale) {
  const r = await fetch(`${SB_URL}/rest/v1/sales?id=eq.${sale.id}`, {
    method: 'PATCH',
    headers: { ...headers, 'Prefer': 'return=representation' },
    body: JSON.stringify({
      name:       sale.name,
      buy_price:  sale.buyPrice,
      sell_price: sale.sellPrice
    })
  });
  if (!r.ok) throw new Error(await r.text());
}

async function dbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/sales?id=eq.${id}`, {
    method: 'DELETE',
    headers
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── HELPERS ───────────────────────────────────────────────
const gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const mSales = (m, y) => S.sales.filter(s => { const d = new Date(s.date); return d.getMonth()===m && d.getFullYear()===y; });
const ySales = y => S.sales.filter(s => new Date(s.date).getFullYear() === y);
const sumRevenue = arr => arr.reduce((a,s) => a + s.sellPrice, 0);
const sumProfit  = arr => arr.reduce((a,s) => a + (s.sellPrice - s.buyPrice), 0);
const fmt   = n => n.toLocaleString('en-CA', {minimumFractionDigits:2, maximumFractionDigits:2});
const fdate = iso => { const d = new Date(iso); return `${d.getDate().toString().padStart(2,'0')} ${MO[d.getMonth()]}`; };
const plural = n => n%10===1&&n%100!==11?'продажа':[2,3,4].includes(n%10)&&![12,13,14].includes(n%100)?'продажи':'продаж';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── ACTIONS ───────────────────────────────────────────────
async function addSale() {
  const name = S.newName.trim();
  const sell = parseFloat(S.newSell);
  const buy  = parseFloat(S.newBuy) || 0;
  if (!name || isNaN(sell) || sell <= 0) return;

  const now  = new Date();
  const sale = {
    id: gid(), name, buyPrice: buy, sellPrice: sell,
    date: new Date(S.year, S.month, now.getDate(), now.getHours(), now.getMinutes()).toISOString()
  };

  // Optimistic update
  S.sales.unshift(sale);
  S.newName = ''; S.newBuy = ''; S.newSell = '';
  S.saving = true; S.syncOk = null;
  render();

  try {
    await dbInsert(sale);
    S.syncOk = true;
  } catch(e) {
    // Rollback
    S.sales = S.sales.filter(x => x.id !== sale.id);
    S.syncOk = false;
    alert('Ошибка сохранения. Попробуй ещё раз.');
  } finally {
    S.saving = false;
    render();
  }
}

async function saveEdit(id) {
  const name = S.editName.trim();
  const sell = parseFloat(S.editSell);
  const buy  = parseFloat(S.editBuy) || 0;
  if (!name || isNaN(sell) || sell <= 0) return;

  const s = S.sales.find(x => x.id === id);
  const prev = { name: s.name, buyPrice: s.buyPrice, sellPrice: s.sellPrice };

  s.name = name; s.buyPrice = buy; s.sellPrice = sell;
  S.editId = null; S.saving = true; S.syncOk = null;
  render();

  try {
    await dbUpdate(s);
    S.syncOk = true;
  } catch(e) {
    // Rollback
    Object.assign(s, prev);
    S.syncOk = false;
    alert('Ошибка сохранения. Попробуй ещё раз.');
  } finally {
    S.saving = false;
    render();
  }
}

async function doDelete(id) {
  const idx = S.sales.findIndex(x => x.id === id);
  const [removed] = S.sales.splice(idx, 1);
  S.delId = null; S.saving = true; S.syncOk = null;
  render();

  try {
    await dbDelete(id);
    S.syncOk = true;
  } catch(e) {
    // Rollback
    S.sales.splice(idx, 0, removed);
    S.syncOk = false;
    alert('Ошибка удаления. Попробуй ещё раз.');
  } finally {
    S.saving = false;
    render();
  }
}

function copyToForm(id) {
  const s = S.sales.find(x => x.id === id);
  if (!s) return;
  S.newName = s.name;
  S.newBuy  = s.buyPrice ? String(s.buyPrice) : '';
  S.newSell = String(s.sellPrice);
  S.editId  = null;
  const now = new Date();
  S.month = now.getMonth();
  S.year  = now.getFullYear();
  render();
  setTimeout(() => {
    const el = document.getElementById('inName');
    if (el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.focus(); el.select(); }
  }, 80);
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const ms    = mSales(S.month, S.year).sort((a,b) => new Date(b.date) - new Date(a.date));
  const ys    = ySales(S.year);
  const mRev  = sumRevenue(ms);
  const mProf = sumProfit(ms);
  const yProf = sumProfit(ys);

  const spark  = Array.from({length:12}, (_,i) => sumProfit(mSales(i, S.year)));
  const maxSp  = Math.max(...spark.map(Math.abs), 1);
  const hasData = spark.map(v => v !== 0);

  // Sync dot class
  const syncCls = S.saving ? 'loading' : S.syncOk === true ? 'ok' : S.syncOk === false ? 'err' : '';

  let h = `<div class="hdr">
    <div class="hdr-top">
      <span class="app-name">✦ Продажи</span>
      <div class="hdr-right">
        <div class="sync ${syncCls}" title="${S.saving?'Сохранение...':S.syncOk?'Синхронизировано':'Нет связи'}"></div>
        <div class="year-nav">
          <button class="yr-btn" onclick="S.year--;S.editId=null;render()">‹</button>
          <span class="yr-num">${S.year}</span>
          <button class="yr-btn" onclick="S.year++;S.editId=null;render()">›</button>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat revenue">
        <div class="stat-lbl">Выручка<br>${MO[S.month]}</div>
        <div class="stat-amt">$${fmt(mRev)}</div>
        <div class="stat-cnt">${ms.length} ${plural(ms.length)}</div>
      </div>
      <div class="stat profit-m">
        <div class="stat-lbl">Прибыль<br>${MO[S.month]}</div>
        <div class="stat-amt">$${fmt(mProf)}</div>
        <div class="stat-cnt">${mProf>=0?'▲':'▼'} чистая</div>
      </div>
      <div class="stat profit-y">
        <div class="stat-lbl">Прибыль<br>${S.year}</div>
        <div class="stat-amt">$${fmt(yProf)}</div>
        <div class="stat-cnt">${ys.length} продаж</div>
      </div>
    </div>

    <div class="sparkline">`;

  for (let i = 0; i < 12; i++) {
    const v = spark[i], cur = i === S.month;
    const pct = v !== 0 ? Math.max((Math.abs(v)/maxSp)*100, 15) : 0;
    const bg  = cur ? 'var(--accent)' : v > 0 ? 'var(--teal)' : v < 0 ? 'var(--red)' : 'var(--muted2)';
    h += `<div class="sp-col" onclick="S.month=${i};S.editId=null;render()">
      <div class="sp-bar${cur?' cur':''}" style="height:${pct}%;background:${bg};width:100%;border-radius:2px 2px 0 0;min-height:${pct>0?2:0}px"></div>
      <div class="sp-lbl${cur?' cur':''}">${MO[i]}</div>
    </div>`;
  }

  h += `</div><div class="tabs-wrap" id="tabsEl">`;
  for (let i = 0; i < 12; i++) {
    const cur = i === S.month, has = hasData[i] && !cur;
    h += `<button class="tab${cur?' active':''}${has?' has-data':''}" onclick="S.month=${i};S.editId=null;render()">${MO[i]}</button>`;
  }
  h += `</div></div>`;

  // Form
  const busy = S.saving || S.loading;
  h += `<div class="form-wrap"><div class="form-inner">
    <input class="inp" id="inName" type="text" placeholder="Название товара"
      value="${esc(S.newName)}" oninput="S.newName=this.value" ${busy?'disabled':''}
      onkeydown="if(event.key==='Enter')document.getElementById('inBuy').focus()"/>
    <div class="form-prices">
      <div class="price-group">
        <span class="price-prefix">$</span>
        <input class="inp mono" id="inBuy" type="number" placeholder="Закупка" min="0" step="0.01"
          value="${S.newBuy}" oninput="S.newBuy=this.value" ${busy?'disabled':''}
          onkeydown="if(event.key==='Enter')document.getElementById('inSell').focus()"/>
      </div>
      <div class="price-group">
        <span class="price-prefix">$</span>
        <input class="inp mono" id="inSell" type="number" placeholder="Продажа" min="0" step="0.01"
          value="${S.newSell}" oninput="S.newSell=this.value" ${busy?'disabled':''}
          onkeydown="if(event.key==='Enter')addSale()"/>
      </div>
      <button class="btn-add" onclick="addSale()" ${busy?'disabled':''}>+</button>
    </div>
  </div></div>`;

  // List
  h += `<div class="list">`;
  if (S.loading) {
    h += `<div class="empty"><div class="empty-i">⏳</div>Загрузка...</div>`;
  } else if (!ms.length) {
    h += `<div class="empty"><div class="empty-i">📦</div>Нет продаж в ${MF[S.month].toLowerCase()}</div>`;
  } else {
    ms.forEach((s, i) => {
      const profit    = s.sellPrice - s.buyPrice;
      const profitCls = profit < 0 ? ' loss' : '';
      if (S.editId === s.id) {
        h += `<div class="row editing">
          <div class="edit-row-top">
            <input class="edit-inp" style="flex:1" value="${esc(S.editName)}"
              oninput="S.editName=this.value"
              onkeydown="if(event.key==='Enter')saveEdit('${s.id}')"/>
            <button class="btn-x" onclick="S.editId=null;render()">✕</button>
          </div>
          <div class="edit-row-bot">
            <input class="edit-inp mono sm" type="number" placeholder="Закупка"
              value="${S.editBuy}" oninput="S.editBuy=this.value"/>
            <span style="color:var(--muted);font-size:12px;">→</span>
            <input class="edit-inp mono sm" type="number" placeholder="Продажа"
              value="${S.editSell}" oninput="S.editSell=this.value"
              onkeydown="if(event.key==='Enter')saveEdit('${s.id}')"/>
            <button class="btn-ok" onclick="saveEdit('${s.id}')">Сохранить</button>
          </div>
        </div>`;
      } else {
        h += `<div class="row">
          <span class="row-num">${i+1}</span>
          <span class="row-name">${esc(s.name)}</span>
          <span class="row-profit${profitCls}">${profit>=0?'+':''}${fmt(profit)}</span>
          <div class="row-meta">
            <div class="row-prices-txt">
              <span class="price-buy">$${fmt(s.buyPrice)}</span>
              <span class="price-arrow">→</span>
              <span class="price-sell">$${fmt(s.sellPrice)}</span>
            </div>
            <span class="row-date">${fdate(s.date)}</span>
          </div>
          <div class="row-actions">
            <button class="ico edit" onclick="S.editId='${s.id}';S.editName='${esc(s.name)}';S.editBuy='${s.buyPrice}';S.editSell='${s.sellPrice}';render()">✎</button>
            <button class="ico copy" onclick="copyToForm('${s.id}')" title="Скопировать в форму">⧉</button>
            <button class="ico del"  onclick="S.delId='${s.id}';render()">✕</button>
          </div>
        </div>`;
      }
    });
  }
  h += `</div>`;

  // Delete modal
  if (S.delId) {
    const it = S.sales.find(x => x.id === S.delId);
    const p  = it ? (it.sellPrice - it.buyPrice) : 0;
    h += `<div class="overlay" onclick="if(event.target===this){S.delId=null;render()}">
      <div class="modal">
        <div class="modal-i">🗑</div>
        <div class="modal-t">Удалить запись?</div>
        <div class="modal-s">${esc(it?.name||'')} · прибыль $${fmt(p)}</div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="S.delId=null;render()">Отмена</button>
          <button class="btn-del" onclick="doDelete('${S.delId}')">Удалить</button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML = h;

  setTimeout(() => {
    const el = document.getElementById('tabsEl');
    if (el) { const a = el.querySelector('.tab.active'); if (a) a.scrollIntoView({inline:'center', behavior:'smooth', block:'nearest'}); }
  }, 60);
}

// ── INIT ──────────────────────────────────────────────────
render(); // show loading state immediately
dbLoad(); // fetch from Supabase
</script>
</body>
</html>
